name: Full CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t santhiya2185/autodeploy-lite:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u santhiya2185 --password-stdin

      - name: Push Image
        run: docker push santhiya2185/autodeploy-lite:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull santhiya2185/autodeploy-lite:latest
            docker stop meena-app || true
            docker rm meena-app || true
            docker run -d -p 5000:5000 --name meena-app santhiya2185/autodeploy-lite:latest